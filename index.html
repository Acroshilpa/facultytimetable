const SEM_COLORS = ["#1a73e8","#0f9d58","#f4b400","#db4437","#7b1fa2","#00838f"];

  1:{bg:"#e6f4ea",text:"#137333",border:"#81c995",emoji:"🥇",label:"1st Choice"},
  2:{bg:"#fef7e0",text:"#994c00",border:"#fdd663",emoji:"🥈",label:"2nd Choice"},

// ══════════════════════════════════════════════════════════════════════════════
// 🔥 FIREBASE INIT
// ══════════════════════════════════════════════════════════════════════════════
let db = null;
let auth = null;
let firebaseOk = false;
const googleProvider = typeof firebase !== "undefined" ? new firebase.auth.GoogleAuthProvider() : null;
if (googleProvider) {
  googleProvider.setCustomParameters({ hd: "acropolis.in" }); // restrict to acropolis.in Google Workspace accounts
}

try {
  const app = firebase.initializeApp(firebaseConfig);
  db = firebase.database(app);
  auth = firebase.auth(app);
  firebaseOk = !firebaseConfig.apiKey.includes("PASTE");
} catch(e) {
  console.warn("Firebase not configured:", e.message);
}

// Google Sign-In
async function signInWithGoogle() {
  const result = await auth.signInWithPopup(googleProvider);
  const email = (result.user.email || "").toLowerCase();
  if (!email.endsWith("@acropolis.in")) {
    await auth.signOut();
    throw new Error("Please sign in with your @acropolis.in Google account.");
  }
  if (email === ADMIN_EMAIL) {
    return { role: "admin", user: result.user };
  }
  const fac = FACULTY_LIST.find(f => f.email.toLowerCase() === email);
  if (!fac) {
    await auth.signOut();
    throw new Error("Your email is not registered as faculty. Contact your coordinator.");
  }
  return { role: "faculty", faculty: fac, user: result.user };
}

function signOutGoogle() {
  if (auth) auth.signOut();
}

// Realtime listeners + writes
function subscribeChoices(callback) {
  if (!firebaseOk) return () => {};
  const ref = db.ref("choices");
  ref.on("value", snap => callback(snap.val() || {}));
  return () => ref.off("value");
}

async function writeFacultyChoices(short, data) {
  if (!firebaseOk) return;
  await db.ref(`choices/${short}`).set(data);
}

async function clearFacultyChoices(short) {
  if (!firebaseOk) return;
  await db.ref(`choices/${short}`).remove();
}

// ══════════════════════════════════════════════════════════════════════════════
// 📥 EXCEL EXPORT
// ══════════════════════════════════════════════════════════════════════════════
function exportExcel(choices) {
  const wb = XLSX.utils.book_new();

  // ── Helper: style a cell ──────────────────────────────────────────────────
  function setCell(ws, addr, value, {bold=false, bg=null, color=null, align="left", border=false}={}) {
    if (!ws[addr]) ws[addr] = {};
    ws[addr].v = value;
    ws[addr].t = typeof value === "number" ? "n" : "s";
    const font = { name: "Calibri", sz: 11 };
    if (bold) font.bold = true;
    if (color) font.color = { rgb: color };
    ws[addr].s = { font, alignment: { horizontal: align, vertical: "center", wrapText: true } };
    if (bg) ws[addr].s.fill = { patternType: "solid", fgColor: { rgb: bg } };
    if (border) ws[addr].s.border = {
      top:{style:"thin",color:{rgb:"BDBDBD"}}, bottom:{style:"thin",color:{rgb:"BDBDBD"}},
      left:{style:"thin",color:{rgb:"BDBDBD"}}, right:{style:"thin",color:{rgb:"BDBDBD"}}
    };
  }

  function cellAddr(c, r) { return XLSX.utils.encode_cell({c, r}); }

  const PREF_LABEL = { 1:"1st Preference 🥇", 2:"2nd Preference 🥈", 3:"3rd Preference 🥉" };
  const PREF_BG    = { 1:"E6F4EA", 2:"FEF7E0", 3:"FCE8E6" };
  const PREF_FG    = { 1:"137333", 2:"994C00", 3:"C5221F" };
  const SEM_BG     = ["1A73E8","0F9D58","F4B400","DB4437","7B1FA2","00838F"];
  const HDR_BG     = "1F3864";

  // ══════════════════════════════════════════════════════════════════════════
  // SHEET 1 — All Faculty Choices (filled only, grouped by faculty → semester)
  // ══════════════════════════════════════════════════════════════════════════
  const ws1 = { "!cols": [{ wch:26 },{ wch:12 },{ wch:30 },{ wch:10 },{ wch:18 }] };
  let r = 0;

  // Title row
  ws1["!merges"] = [];
  setCell(ws1, cellAddr(0,r), "Faculty Subject Preferences — Filled Choices Only",
    { bold:true, bg:HDR_BG, color:"FFFFFF", align:"center" });
  for(let c=1;c<=4;c++) setCell(ws1, cellAddr(c,r), "", { bg:HDR_BG });
  ws1["!merges"].push({ s:{r,c:0}, e:{r,c:4} });
  r++;

  // Column headers
  ["Faculty / Semester","Subject Code","Subject Name","Credits","Preference"].forEach((h,c)=>{
    setCell(ws1, cellAddr(c,r), h, { bold:true, bg:"2E75B6", color:"FFFFFF", align:"center", border:true });
  });
  r++;

  let hasAnyData = false;
  for (const f of FACULTY_LIST) {
    const fc = choices[f.short] || {};
    // collect only filled entries
    const filledBySem = {};
    for (const [semStr, subs] of Object.entries(SEMESTERS)) {
      const sem = parseInt(semStr);
      const filled = subs
        .map(s => ({ s, p: fc[sem]?.[s.code] }))
        .filter(({p}) => p?.rank)
        .sort((a,b) => a.p.rank - b.p.rank);
      if (filled.length) filledBySem[sem] = filled;
    }
    if (Object.keys(filledBySem).length === 0) continue;
    hasAnyData = true;

    // Faculty name row (spans all cols)
    setCell(ws1, cellAddr(0,r), `👤  ${f.name}  (${f.email})`,
      { bold:true, bg:"E8F0FE", color:"1A237E", border:true });
    for(let c=1;c<=4;c++) setCell(ws1, cellAddr(c,r), "", { bg:"E8F0FE", border:true });
    ws1["!merges"].push({ s:{r,c:0}, e:{r,c:4} });
    r++;

    for (const [sem, filled] of Object.entries(filledBySem)) {
      const semIdx = parseInt(sem) - 1;
      const bg = SEM_BG[semIdx] || "607D8B";

      // Semester sub-header
      setCell(ws1, cellAddr(0,r), `  Semester ${sem}`,
        { bold:true, bg, color:"FFFFFF", border:true });
      for(let c=1;c<=4;c++) setCell(ws1, cellAddr(c,r), "", { bg, border:true });
      ws1["!merges"].push({ s:{r,c:0}, e:{r,c:4} });
      r++;

      // Subject rows — only filled ones
      for (const {s, p} of filled) {
        const pbg = PREF_BG[p.rank] || "FFFFFF";
        const pfg = PREF_FG[p.rank] || "000000";
        setCell(ws1, cellAddr(0,r), "", { bg:"FAFAFA", border:true });      // faculty col blank (already shown)
        setCell(ws1, cellAddr(1,r), s.code,  { bg:"FAFAFA", align:"center", border:true });
        setCell(ws1, cellAddr(2,r), s.name,  { bg:"FAFAFA", border:true });
        setCell(ws1, cellAddr(3,r), s.credits,{ bg:"FAFAFA", align:"center", border:true });
        setCell(ws1, cellAddr(4,r), PREF_LABEL[p.rank] || "", { bg:pbg, color:pfg, align:"center", bold:true, border:true });
        r++;
      }
    }
    // blank spacer between faculty
    for(let c=0;c<=4;c++) ws1[cellAddr(c,r)] = { v:"", t:"s" };
    r++;
  }

  if (!hasAnyData) {
    setCell(ws1, cellAddr(0,r), "No choices submitted yet.", { bold:true, color:"C5221F" });
    r++;
  }

  ws1["!ref"] = XLSX.utils.encode_range({ s:{r:0,c:0}, e:{r:r-1,c:4} });
  ws1["!rows"] = Array.from({length:r}, (_,i)=>({ hpt: i===0 ? 22 : 18 }));
  XLSX.utils.book_append_sheet(wb, ws1, "All Choices");

  // ══════════════════════════════════════════════════════════════════════════
  // SHEET 2 — Semester-wise view: which faculty chose which subject
  // ══════════════════════════════════════════════════════════════════════════
  const ws2 = { "!cols": [{ wch:12 },{ wch:28 },{ wch:10 },{ wch:24 },{ wch:24 },{ wch:24 }] };
  ws2["!merges"] = [];
  let r2 = 0;

  setCell(ws2, cellAddr(0,r2), "Semester-wise Subject Preferences",
    { bold:true, bg:HDR_BG, color:"FFFFFF", align:"center" });
  for(let c=1;c<=5;c++) setCell(ws2, cellAddr(c,r2), "", { bg:HDR_BG });
  ws2["!merges"].push({ s:{r:r2,c:0}, e:{r:r2,c:5} });
  r2++;

  for (const [semStr, subs] of Object.entries(SEMESTERS)) {
    const sem = parseInt(semStr);
    const semIdx = sem - 1;
    const bg = SEM_BG[semIdx] || "607D8B";

    // Semester header
    setCell(ws2, cellAddr(0,r2), `Semester ${sem}`,
      { bold:true, bg, color:"FFFFFF", align:"center", border:true });
    for(let c=1;c<=5;c++) setCell(ws2, cellAddr(c,r2), "", { bg, border:true });
    ws2["!merges"].push({ s:{r:r2,c:0}, e:{r:r2,c:5} });
    r2++;

    // Column headers
    ["Subject Code","Subject Name","Credits","1st Preference 🥇","2nd Preference 🥈","3rd Preference 🥉"]
      .forEach((h,c) => setCell(ws2, cellAddr(c,r2), h,
        { bold:true, bg:"2E75B6", color:"FFFFFF", align:"center", border:true }));
    r2++;

    for (const s of subs) {
      const f1 = FACULTY_LIST.filter(f=>choices[f.short]?.[sem]?.[s.code]?.rank===1).map(f=>f.short);
      const f2 = FACULTY_LIST.filter(f=>choices[f.short]?.[sem]?.[s.code]?.rank===2).map(f=>f.short);
      const f3 = FACULTY_LIST.filter(f=>choices[f.short]?.[sem]?.[s.code]?.rank===3).map(f=>f.short);
      // only show row if at least one faculty chose this subject
      if (f1.length + f2.length + f3.length === 0) continue;

      const rowBg = "FAFAFA";
      setCell(ws2, cellAddr(0,r2), s.code,          { bg:rowBg, align:"center", border:true });
      setCell(ws2, cellAddr(1,r2), s.name,          { bg:rowBg, border:true });
      setCell(ws2, cellAddr(2,r2), s.credits,       { bg:rowBg, align:"center", border:true });
      setCell(ws2, cellAddr(3,r2), f1.join(", ")||"—", { bg:f1.length?"E6F4EA":rowBg, color:f1.length?"137333":"9E9E9E", border:true });
      setCell(ws2, cellAddr(4,r2), f2.join(", ")||"—", { bg:f2.length?"FEF7E0":rowBg, color:f2.length?"994C00":"9E9E9E", border:true });
      setCell(ws2, cellAddr(5,r2), f3.join(", ")||"—", { bg:f3.length?"FCE8E6":rowBg, color:f3.length?"C5221F":"9E9E9E", border:true });
      r2++;
    }

    for(let c=0;c<=5;c++) ws2[cellAddr(c,r2)] = { v:"", t:"s" };
    r2++;
  }

  ws2["!ref"] = XLSX.utils.encode_range({ s:{r:0,c:0}, e:{r:r2-1,c:5} });
  ws2["!rows"] = Array.from({length:r2}, ()=>({ hpt:18 }));
  XLSX.utils.book_append_sheet(wb, ws2, "Semester-wise View");

  // ══════════════════════════════════════════════════════════════════════════
  // SHEET 3 — Faculty Summary (submission status)
  // ══════════════════════════════════════════════════════════════════════════
  const ws3 = { "!cols": [{ wch:26 },{ wch:32 },{ wch:12 },{ wch:12 },{ wch:12 },{ wch:10 },{ wch:14 }] };
  ws3["!merges"] = [];
  let r3 = 0;

  setCell(ws3, cellAddr(0,r3), "Faculty Submission Summary",
    { bold:true, bg:HDR_BG, color:"FFFFFF", align:"center" });
  for(let c=1;c<=6;c++) setCell(ws3, cellAddr(c,r3), "", { bg:HDR_BG });
  ws3["!merges"].push({ s:{r:r3,c:0}, e:{r:r3,c:6} });
  r3++;

  ["Faculty Name","Email","1st Pref","2nd Pref","3rd Pref","Total","Status"].forEach((h,c)=>
    setCell(ws3, cellAddr(c,r3), h, { bold:true, bg:"2E75B6", color:"FFFFFF", align:"center", border:true }));
  r3++;

  for (const f of FACULTY_LIST) {
    const fc = choices[f.short] || {};
    let c1=0, c2=0, c3=0;
    for (const semData of Object.values(fc))
      for (const v of Object.values(semData || {})) {
        if (v?.rank===1) c1++; else if (v?.rank===2) c2++; else if (v?.rank===3) c3++;
      }
    const tot = c1+c2+c3;
    const status = tot===0 ? "⏳ Not Submitted" : tot<3 ? "🔶 Partial" : "✅ Complete";
    const statusBg = tot===0 ? "FCE8E6" : tot<3 ? "FEF7E0" : "E6F4EA";
    const rowBg = "FAFAFA";
    setCell(ws3, cellAddr(0,r3), f.name,    { bg:rowBg, border:true });
    setCell(ws3, cellAddr(1,r3), f.email,   { bg:rowBg, border:true });
    setCell(ws3, cellAddr(2,r3), c1,        { bg:"E6F4EA", align:"center", border:true });
    setCell(ws3, cellAddr(3,r3), c2,        { bg:"FEF7E0", align:"center", border:true });
    setCell(ws3, cellAddr(4,r3), c3,        { bg:"FCE8E6", align:"center", border:true });
    setCell(ws3, cellAddr(5,r3), tot,       { bg:rowBg, align:"center", bold:true, border:true });
    setCell(ws3, cellAddr(6,r3), status,    { bg:statusBg, align:"center", bold:true, border:true });
    r3++;
  }

  ws3["!ref"] = XLSX.utils.encode_range({ s:{r:0,c:0}, e:{r:r3-1,c:6} });
  ws3["!rows"] = Array.from({length:r3}, ()=>({ hpt:18 }));
  XLSX.utils.book_append_sheet(wb, ws3, "Submission Status");

  // ══════════════════════════════════════════════════════════════════════════
  // SHEET 4 — Subject-wise Deep Analysis
  // ══════════════════════════════════════════════════════════════════════════
  const ws4 = { "!cols": [{wch:12},{wch:28},{wch:8},{wch:10},{wch:10},{wch:10},{wch:16},{wch:28},{wch:18},{wch:16}] };
  ws4["!merges"] = [];
  let r4 = 0;

  // Title
  setCell(ws4, cellAddr(0,r4), "Subject-wise Analysis — Demand & Interest",
    { bold:true, bg:HDR_BG, color:"FFFFFF", align:"center" });
  for(let c=1;c<=9;c++) setCell(ws4, cellAddr(c,r4), "", { bg:HDR_BG });
  ws4["!merges"].push({ s:{r:r4,c:0}, e:{r:r4,c:9} });
  r4++;

  // Legend
  setCell(ws4, cellAddr(0,r4), "🔴 High Conflict = 2+ faculty chose as 1st pref  |  🟡 Low Interest = only 2nd/3rd chosen  |  ⚪ No Interest = nobody chose",
    { bold:false, bg:"FFF8E1", color:"5D4037", align:"left" });
  for(let c=1;c<=9;c++) setCell(ws4, cellAddr(c,r4), "", { bg:"FFF8E1" });
  ws4["!merges"].push({ s:{r:r4,c:0}, e:{r:r4,c:9} });
  r4++;

  const hdr4 = ["Subject Code","Subject Name","Credits","1st Pref\nCount","2nd Pref\nCount","3rd Pref\nCount",
                 "Total Interest","Faculty Who Chose (1st)","Faculty Who Chose (2nd/3rd)","Status"];
  hdr4.forEach((h,c)=>setCell(ws4, cellAddr(c,r4), h,
    { bold:true, bg:"1F3864", color:"FFFFFF", align:"center", border:true }));
  r4++;

  for (const [semStr, subs] of Object.entries(SEMESTERS)) {
    const sem = parseInt(semStr);
    const semBg = SEM_BG[sem-1] || "607D8B";

    // Sem divider
    setCell(ws4, cellAddr(0,r4), `Semester ${sem}`,
      { bold:true, bg:semBg, color:"FFFFFF", align:"center", border:true });
    for(let c=1;c<=9;c++) setCell(ws4, cellAddr(c,r4), "", { bg:semBg, border:true });
    ws4["!merges"].push({ s:{r:r4,c:0}, e:{r:r4,c:9} });
    r4++;

    for (const s of subs) {
      const f1 = FACULTY_LIST.filter(f=>choices[f.short]?.[sem]?.[s.code]?.rank===1);
      const f2 = FACULTY_LIST.filter(f=>choices[f.short]?.[sem]?.[s.code]?.rank===2);
      const f3 = FACULTY_LIST.filter(f=>choices[f.short]?.[sem]?.[s.code]?.rank===3);
      const total = f1.length + f2.length + f3.length;

      let status, rowBg, fgCol;
      if (f1.length >= 2)       { status="🔴 High Conflict";  rowBg="FCE8E6"; fgCol="C5221F"; }
      else if (f1.length === 1) { status="✅ Assigned";        rowBg="E6F4EA"; fgCol="137333"; }
      else if (total > 0)       { status="🟡 Low Interest";   rowBg="FEF7E0"; fgCol="994C00"; }
      else                      { status="⚪ No Interest";     rowBg="F5F5F5"; fgCol="9E9E9E"; }

      const f23 = [...f2, ...f3].map(f=>`${f.short}(${f2.includes(f)?"2nd":"3rd"})`);

      setCell(ws4, cellAddr(0,r4), s.code,               { bg:rowBg, align:"center", border:true });
      setCell(ws4, cellAddr(1,r4), s.name,               { bg:rowBg, border:true });
      setCell(ws4, cellAddr(2,r4), s.credits,            { bg:rowBg, align:"center", border:true });
      setCell(ws4, cellAddr(3,r4), f1.length,            { bg:f1.length>=2?"FCE8E6":"E6F4EA", align:"center", bold:true, border:true });
      setCell(ws4, cellAddr(4,r4), f2.length,            { bg:"FEF7E0", align:"center", border:true });
      setCell(ws4, cellAddr(5,r4), f3.length,            { bg:"FCE8E6", align:"center", border:true });
      setCell(ws4, cellAddr(6,r4), total,                { bg:total>0?"E8F0FE":"F5F5F5", align:"center", bold:true, border:true });
      setCell(ws4, cellAddr(7,r4), f1.map(f=>f.name).join(", ") || "—",
        { bg:f1.length?"E6F4EA":rowBg, color:f1.length?"137333":"9E9E9E", border:true });
      setCell(ws4, cellAddr(8,r4), f23.join(", ") || "—",
        { bg:f23.length?"FEF7E0":rowBg, color:f23.length?"994C00":"9E9E9E", border:true });
      setCell(ws4, cellAddr(9,r4), status,               { bg:rowBg, color:fgCol, bold:true, align:"center", border:true });
      r4++;
    }
    for(let c=0;c<=9;c++) ws4[cellAddr(c,r4)] = { v:"", t:"s" };
    r4++;
  }

  ws4["!ref"] = XLSX.utils.encode_range({ s:{r:0,c:0}, e:{r:r4-1,c:9} });
  ws4["!rows"] = Array.from({length:r4}, (_,i)=>({ hpt: i<2 ? 20 : 18 }));
  XLSX.utils.book_append_sheet(wb, ws4, "Subject-wise Analysis");

  // ══════════════════════════════════════════════════════════════════════════
  // SHEET 5 — Faculty-wise Workload & Coverage Analysis
  // ══════════════════════════════════════════════════════════════════════════
  const ws5 = { "!cols": [{wch:26},{wch:12},{wch:12},{wch:10},{wch:10},{wch:10},{wch:10},{wch:18},{wch:18}] };
  ws5["!merges"] = [];
  let r5 = 0;

  setCell(ws5, cellAddr(0,r5), "Faculty-wise Workload & Coverage Analysis",
    { bold:true, bg:HDR_BG, color:"FFFFFF", align:"center" });
  for(let c=1;c<=8;c++) setCell(ws5, cellAddr(c,r5), "", { bg:HDR_BG });
  ws5["!merges"].push({ s:{r:r5,c:0}, e:{r:r5,c:8} });
  r5++;

  // Summary stats row
  const totalFac = FACULTY_LIST.length;
  const submittedFac = FACULTY_LIST.filter(f=>{
    const fc = choices[f.short]||{};
    return Object.values(fc).some(s=>Object.values(s||{}).some(v=>v?.rank));
  }).length;
  const totalSubjects = Object.values(SEMESTERS).flat().length;
  const coveredSubjects = Object.entries(SEMESTERS).reduce((acc,[semStr,subs])=>{
    const sem=parseInt(semStr);
    return acc + subs.filter(s=>FACULTY_LIST.some(f=>choices[f.short]?.[sem]?.[s.code]?.rank)).length;
  },0);

  const statsRow = [
    [`Total Faculty: ${totalFac}`, `Submitted: ${submittedFac}`, `Pending: ${totalFac-submittedFac}`,
     `Total Subjects: ${totalSubjects}`, `Covered: ${coveredSubjects}`, `Uncovered: ${totalSubjects-coveredSubjects}`]
  ];
  statsRow[0].forEach((v,c)=>{
    const bgs = ["E8F0FE","E6F4EA","FCE8E6","E8F0FE","E6F4EA","FCE8E6"];
    setCell(ws5, cellAddr(c,r5), v, { bold:true, bg:bgs[c]||"FAFAFA", align:"center", border:true });
  });
  for(let c=6;c<=8;c++) setCell(ws5, cellAddr(c,r5), "", { bg:"FAFAFA", border:true });
  r5++;

  // Column headers
  ["Faculty Name","Semesters\nCovered","Subjects\nChosen","1st Pref","2nd Pref","3rd Pref","Total\nCredits","Subjects Chosen (1st)","Workload Level"]
    .forEach((h,c)=>setCell(ws5, cellAddr(c,r5), h, { bold:true, bg:"2E75B6", color:"FFFFFF", align:"center", border:true }));
  r5++;

  for (const f of FACULTY_LIST) {
    const fc = choices[f.short] || {};
    let c1=0,c2=0,c3=0,totalCredits=0;
    const semsWithChoices = new Set();
    const first1st = [];

    for (const [semStr, subs] of Object.entries(SEMESTERS)) {
      const sem = parseInt(semStr);
      for (const s of subs) {
        const p = fc[sem]?.[s.code];
        if (!p?.rank) continue;
        if (p.rank===1){ c1++; totalCredits+=s.credits; semsWithChoices.add(sem); first1st.push(s.name); }
        else if (p.rank===2){ c2++; semsWithChoices.add(sem); }
        else if (p.rank===3){ c3++; semsWithChoices.add(sem); }
      }
    }
    const tot = c1+c2+c3;
    let workload, wlBg;
    if (tot===0)       { workload="⏳ Not Started"; wlBg="F5F5F5"; }
    else if (c1===0)   { workload="🟡 No 1st Prefs"; wlBg="FEF7E0"; }
    else if (c1>=4)    { workload="🔴 Overloaded";   wlBg="FCE8E6"; }
    else if (c1>=2)    { workload="✅ Balanced";      wlBg="E6F4EA"; }
    else               { workload="🔵 Light";         wlBg="E8F0FE"; }

    const rowBg = tot===0 ? "F5F5F5" : "FAFAFA";
    setCell(ws5, cellAddr(0,r5), f.name,                           { bg:rowBg, bold:tot>0, border:true });
    setCell(ws5, cellAddr(1,r5), semsWithChoices.size,             { bg:rowBg, align:"center", border:true });
    setCell(ws5, cellAddr(2,r5), tot,                              { bg:tot===0?"FCE8E6":rowBg, align:"center", bold:true, border:true });
    setCell(ws5, cellAddr(3,r5), c1,                               { bg:c1?"E6F4EA":rowBg, align:"center", bold:true, color:c1?"137333":"000000", border:true });
    setCell(ws5, cellAddr(4,r5), c2,                               { bg:c2?"FEF7E0":rowBg, align:"center", border:true });
    setCell(ws5, cellAddr(5,r5), c3,                               { bg:c3?"FCE8E6":rowBg, align:"center", border:true });
    setCell(ws5, cellAddr(6,r5), totalCredits,                     { bg:rowBg, align:"center", bold:true, border:true });
    setCell(ws5, cellAddr(7,r5), first1st.slice(0,4).join(", ")||(tot>0?"Only 2nd/3rd chosen":"—"),
      { bg:rowBg, border:true });
    setCell(ws5, cellAddr(8,r5), workload,                         { bg:wlBg, align:"center", bold:true, border:true });
    r5++;
  }

  ws5["!ref"] = XLSX.utils.encode_range({ s:{r:0,c:0}, e:{r:r5-1,c:8} });
  ws5["!rows"] = Array.from({length:r5}, ()=>({ hpt:18 }));
  XLSX.utils.book_append_sheet(wb, ws5, "Faculty-wise Analysis");

  // ══════════════════════════════════════════════════════════════════════════
  // SHEET 6 — Remaining / Unallocated Subjects (needs attention)
  // ══════════════════════════════════════════════════════════════════════════
  const ws6 = { "!cols": [{wch:12},{wch:28},{wch:8},{wch:14},{wch:14},{wch:20},{wch:24},{wch:22}] };
  ws6["!merges"] = [];
  let r6 = 0;

  setCell(ws6, cellAddr(0,r6), "Remaining Subjects — Needs Coordinator Attention",
    { bold:true, bg:"C62828", color:"FFFFFF", align:"center" });
  for(let c=1;c<=7;c++) setCell(ws6, cellAddr(c,r6), "", { bg:"C62828" });
  ws6["!merges"].push({ s:{r:r6,c:0}, e:{r:r6,c:7} });
  r6++;

  // Tally counts for summary
  let noInterestCount=0, conflictCount=0, lowInterestCount=0;
  for (const [semStr,subs] of Object.entries(SEMESTERS)) {
    const sem=parseInt(semStr);
    for (const s of subs) {
      const f1=FACULTY_LIST.filter(f=>choices[f.short]?.[sem]?.[s.code]?.rank===1).length;
      const total=FACULTY_LIST.filter(f=>choices[f.short]?.[sem]?.[s.code]?.rank).length;
      if(total===0) noInterestCount++;
      else if(f1>=2) conflictCount++;
      else if(f1===0) lowInterestCount++;
    }
  }

  // Summary
  const sumItems = [
    [`🚨 No Interest: ${noInterestCount} subjects`, "FCE8E6","C5221F"],
    [`⚡ Conflicts: ${conflictCount} subjects`,     "FFF3E0","E65100"],
    [`🟡 Low Interest: ${lowInterestCount} subjects`,"FEF7E0","994C00"],
    [`✅ Well Covered: ${Object.values(SEMESTERS).flat().length - noInterestCount - conflictCount - lowInterestCount} subjects`,"E6F4EA","137333"]
  ];
  sumItems.forEach(([txt,bg,col],c)=>{
    setCell(ws6, cellAddr(c,r6), txt, { bold:true, bg, color:col, align:"center", border:true });
  });
  for(let c=4;c<=7;c++) setCell(ws6, cellAddr(c,r6), "", { bg:"FAFAFA", border:true });
  r6++;

  // Sub-section 1: No Interest
  setCell(ws6, cellAddr(0,r6), "🚨  SECTION A — NO FACULTY INTEREST (Assign Manually)",
    { bold:true, bg:"B71C1C", color:"FFFFFF", align:"left" });
  for(let c=1;c<=7;c++) setCell(ws6, cellAddr(c,r6), "", { bg:"B71C1C" });
  ws6["!merges"].push({ s:{r:r6,c:0}, e:{r:r6,c:7} });
  r6++;

  ["Subject Code","Subject Name","Credits","Semester","Total Faculty","Suggested Action","Available Faculty (no pref)","Priority"].forEach((h,c)=>
    setCell(ws6, cellAddr(c,r6), h, { bold:true, bg:"C62828", color:"FFFFFF", align:"center", border:true }));
  r6++;

  let hasNoInterest=false;
  for (const [semStr,subs] of Object.entries(SEMESTERS)) {
    const sem=parseInt(semStr);
    for (const s of subs) {
      const total=FACULTY_LIST.filter(f=>choices[f.short]?.[sem]?.[s.code]?.rank).length;
      if(total>0) continue;
      hasNoInterest=true;
      // Faculty who haven't chosen this subject at all
      const avail=FACULTY_LIST.filter(f=>!choices[f.short]?.[sem]?.[s.code]?.rank).map(f=>f.short);
      setCell(ws6, cellAddr(0,r6), s.code,                          { bg:"FFF5F5", align:"center", border:true });
      setCell(ws6, cellAddr(1,r6), s.name,                          { bg:"FFF5F5", bold:true, border:true });
      setCell(ws6, cellAddr(2,r6), s.credits,                       { bg:"FFF5F5", align:"center", border:true });
      setCell(ws6, cellAddr(3,r6), `Semester ${sem}`,               { bg:"FFF5F5", align:"center", border:true });
      setCell(ws6, cellAddr(4,r6), FACULTY_LIST.length,             { bg:"FFF5F5", align:"center", border:true });
      setCell(ws6, cellAddr(5,r6), "Coordinator must assign",       { bg:"FCE8E6", color:"C5221F", bold:true, align:"center", border:true });
      setCell(ws6, cellAddr(6,r6), avail.slice(0,5).join(", "),     { bg:"FFF5F5", border:true });
      setCell(ws6, cellAddr(7,r6), s.credits>=4?"🔴 High":"🟡 Medium", { bg:s.credits>=4?"FCE8E6":"FEF7E0", align:"center", bold:true, border:true });
      r6++;
    }
  }
  if(!hasNoInterest){
    setCell(ws6, cellAddr(0,r6), "✅ All subjects have at least some interest!",
      { bold:true, bg:"E6F4EA", color:"137333" });
    for(let c=1;c<=7;c++) setCell(ws6, cellAddr(c,r6), "", { bg:"E6F4EA" });
    ws6["!merges"].push({ s:{r:r6,c:0}, e:{r:r6,c:7} });
    r6++;
  }

  for(let c=0;c<=7;c++) ws6[cellAddr(c,r6)]={v:"",t:"s"}; r6++;

  // Sub-section 2: Conflicts
  setCell(ws6, cellAddr(0,r6), "⚡  SECTION B — CONFLICTS (Multiple Faculty Want Same Subject as 1st Choice)",
    { bold:true, bg:"E65100", color:"FFFFFF", align:"left" });
  for(let c=1;c<=7;c++) setCell(ws6, cellAddr(c,r6), "", { bg:"E65100" });
  ws6["!merges"].push({ s:{r:r6,c:0}, e:{r:r6,c:7} });
  r6++;

  ["Subject Code","Subject Name","Credits","Semester","1st Pref Count","Faculty in Conflict","2nd Pref Fallback","Resolution"].forEach((h,c)=>
    setCell(ws6, cellAddr(c,r6), h, { bold:true, bg:"BF360C", color:"FFFFFF", align:"center", border:true }));
  r6++;

  let hasConflict=false;
  for (const [semStr,subs] of Object.entries(SEMESTERS)) {
    const sem=parseInt(semStr);
    for (const s of subs) {
      const f1=FACULTY_LIST.filter(f=>choices[f.short]?.[sem]?.[s.code]?.rank===1);
      if(f1.length<2) continue;
      hasConflict=true;
      const f2=FACULTY_LIST.filter(f=>choices[f.short]?.[sem]?.[s.code]?.rank===2);
      setCell(ws6, cellAddr(0,r6), s.code,                           { bg:"FFF3E0", align:"center", border:true });
      setCell(ws6, cellAddr(1,r6), s.name,                           { bg:"FFF3E0", bold:true, border:true });
      setCell(ws6, cellAddr(2,r6), s.credits,                        { bg:"FFF3E0", align:"center", border:true });
      setCell(ws6, cellAddr(3,r6), `Semester ${sem}`,                { bg:"FFF3E0", align:"center", border:true });
      setCell(ws6, cellAddr(4,r6), f1.length,                        { bg:"FCE8E6", align:"center", bold:true, color:"C5221F", border:true });
      setCell(ws6, cellAddr(5,r6), f1.map(f=>f.short).join(", "),   { bg:"FCE8E6", color:"C5221F", bold:true, border:true });
      setCell(ws6, cellAddr(6,r6), f2.length?f2.map(f=>f.short).join(", "):"None", { bg:"FEF7E0", border:true });
      setCell(ws6, cellAddr(7,r6), "Assign one; redirect others to 2nd pref", { bg:"FFF3E0", color:"E65100", border:true });
      r6++;
    }
  }
  if(!hasConflict){
    setCell(ws6, cellAddr(0,r6), "✅ No conflicts — each subject has at most 1 faculty with 1st preference!",
      { bold:true, bg:"E6F4EA", color:"137333" });
    for(let c=1;c<=7;c++) setCell(ws6, cellAddr(c,r6), "", { bg:"E6F4EA" });
    ws6["!merges"].push({ s:{r:r6,c:0}, e:{r:r6,c:7} });
    r6++;
  }

  for(let c=0;c<=7;c++) ws6[cellAddr(c,r6)]={v:"",t:"s"}; r6++;

  // Sub-section 3: Faculty who haven't submitted
  setCell(ws6, cellAddr(0,r6), "⏳  SECTION C — FACULTY YET TO SUBMIT CHOICES",
    { bold:true, bg:"37474F", color:"FFFFFF", align:"left" });
  for(let c=1;c<=7;c++) setCell(ws6, cellAddr(c,r6), "", { bg:"37474F" });
  ws6["!merges"].push({ s:{r:r6,c:0}, e:{r:r6,c:7} });
  r6++;

  ["Faculty Name","Email","Status","","","","",""].forEach((h,c)=>
    setCell(ws6, cellAddr(c,r6), h, { bold:true, bg:"546E7A", color:"FFFFFF", align:"center", border:true }));
  r6++;

  const pendingFac = FACULTY_LIST.filter(f=>{
    const fc=choices[f.short]||{};
    return !Object.values(fc).some(s=>Object.values(s||{}).some(v=>v?.rank));
  });
  if(pendingFac.length===0){
    setCell(ws6, cellAddr(0,r6), "✅ All faculty have submitted their choices!",
      { bold:true, bg:"E6F4EA", color:"137333" });
    for(let c=1;c<=7;c++) setCell(ws6, cellAddr(c,r6), "", { bg:"E6F4EA" });
    ws6["!merges"].push({ s:{r:r6,c:0}, e:{r:r6,c:7} });
    r6++;
  } else {
    for(const f of pendingFac){
      setCell(ws6, cellAddr(0,r6), f.name,                     { bg:"FAFAFA", bold:true, border:true });
      setCell(ws6, cellAddr(1,r6), f.email,                    { bg:"FAFAFA", border:true });
      setCell(ws6, cellAddr(2,r6), "⏳ Not Submitted",          { bg:"FCE8E6", color:"C5221F", bold:true, align:"center", border:true });
      for(let c=3;c<=7;c++) setCell(ws6, cellAddr(c,r6), "Send reminder", { bg:"FFF8E1", color:"994C00", align:"center", border:true });
      r6++;
    }
  }

  ws6["!ref"] = XLSX.utils.encode_range({ s:{r:0,c:0}, e:{r:r6-1,c:7} });
  ws6["!rows"] = Array.from({length:r6}, ()=>({ hpt:18 }));
  XLSX.utils.book_append_sheet(wb, ws6, "Remaining & Action Items");

  XLSX.writeFile(wb, "Faculty_Subject_Choices.xlsx");
}

// ══════════════════════════════════════════════════════════════════════════════
// 🧩 SMALL COMPONENTS
// ══════════════════════════════════════════════════════════════════════════════
function Avatar({name,size=36,bg="#1a73e8"}) {
  const initials = name.split(" ").filter(w=>!/^(prof|dr|mr|ms)\.?$/i.test(w))
    .slice(0,2).map(w=>w[0].toUpperCase()).join("");
  return <div style={{width:size,height:size,borderRadius:"50%",background:bg,color:"#fff",
    display:"flex",alignItems:"center",justifyContent:"center",
    fontSize:size*0.38,fontWeight:700,flexShrink:0}}>{initials}</div>;
}

function Toast({msg}) {
  if(!msg) return null;
  return <div style={{position:"fixed",bottom:24,right:24,background:"#202124",color:"#fff",
    padding:"13px 22px",borderRadius:8,fontSize:13,fontWeight:500,zIndex:9999,
    boxShadow:"0 4px 16px rgba(0,0,0,.3)",animation:"fadeIn .2s"}}>{msg}</div>;
}

// 🔐 LOGIN
// ══════════════════════════════════════════════════════════════════════════════
function LoginScreen({onLogin}) {
  const [error,setError]=useState("");
  const [loading,setLoading]=useState(false);

  const handleGoogleSignIn=async()=>{
    setError("");setLoading(true);
    try{
      const result=await signInWithGoogle();
      onLogin(result);
    }catch(e){
      setError(e.message||"Sign-in failed. Please try again.");
    }finally{
      setLoading(false);
    }
  };

  return (
    <div style={{minHeight:"100vh",display:"flex",flexDirection:"column",background:"#f8f9fa"}}>
      {/* Header */}
      <div style={{padding:"16px 28px",display:"flex",alignItems:"center",justifyContent:"space-between",
        background:"#fff",borderBottom:"1px solid #e8eaed"}}>
        <div style={{display:"flex",alignItems:"center",gap:10}}>
          <div style={{width:34,height:34,borderRadius:8,background:"#1a73e8",display:"flex",
            alignItems:"center",justifyContent:"center",color:"#fff",fontWeight:800,fontSize:15}}>A</div>
          <div>
            <div style={{fontSize:15,fontWeight:700,color:"#202124"}}>Acropolis Institute</div>
            <div style={{fontSize:11,color:"#5f6368"}}>CS & IT Department</div>
          </div>
        </div>
        {!firebaseOk&&<div style={{background:"#fef7e0",color:"#994c00",padding:"5px 12px",
          borderRadius:6,fontSize:12,fontWeight:600}}>⚠️ Firebase not configured — demo mode</div>}
      </div>

      {/* Card */}
      <div style={{flex:1,display:"flex",alignItems:"center",justifyContent:"center",padding:24}}>
        <div style={{background:"#fff",borderRadius:16,padding:"40px 44px",width:420,
          boxShadow:"0 2px 12px rgba(0,0,0,.10)",textAlign:"center"}}>
          <svg width="44" height="44" viewBox="0 0 48 48" style={{margin:"0 auto 20px"}}>
            <path fill="#EA4335" d="M24 9.5c3.5 0 6.6 1.2 9.1 3.2l6.8-6.8C35.8 2.2 30.3 0 24 0 14.7 0 6.7 5.4 2.7 13.3l7.9 6.1C12.5 13 17.8 9.5 24 9.5z"/>
            <path fill="#4285F4" d="M46.5 24.5c0-1.6-.1-3.1-.4-4.5H24v8.5h12.7c-.6 3-2.3 5.5-4.8 7.2l7.6 5.9c4.4-4.1 7-10.1 7-17.1z"/>
            <path fill="#FBBC05" d="M10.6 28.6A14.5 14.5 0 0 1 9.5 24c0-1.6.3-3.2.8-4.6l-7.9-6.1A24 24 0 0 0 0 24c0 3.9.9 7.5 2.7 10.7l7.9-6.1z"/>
            <path fill="#34A853" d="M24 48c6.3 0 11.6-2.1 15.5-5.7l-7.6-5.9c-2.1 1.4-4.8 2.2-7.9 2.2-6.2 0-11.5-3.5-13.4-8.6l-7.9 6.1C6.7 42.6 14.7 48 24 48z"/>
          </svg>

          <h2 style={{fontSize:22,fontWeight:400,color:"#202124",marginBottom:6}}>Sign in</h2>
          <p style={{fontSize:13,color:"#5f6368",marginBottom:28}}>
            Use your <span style={{color:"#1a73e8",fontWeight:500}}>@acropolis.in</span> Google account
          </p>

          {error&&<Err msg={error}/>}

          <button onClick={handleGoogleSignIn} disabled={loading||!firebaseOk}
            style={{width:"100%",display:"flex",alignItems:"center",justifyContent:"center",gap:10,
              padding:"11px 16px",border:"1.5px solid #dadce0",borderRadius:8,background:"#fff",
              fontSize:14,fontWeight:600,color:"#3c4043",cursor:loading||!firebaseOk?"not-allowed":"pointer",
              opacity:loading||!firebaseOk?0.6:1}}>
            <svg width="18" height="18" viewBox="0 0 48 48">
              <path fill="#EA4335" d="M24 9.5c3.5 0 6.6 1.2 9.1 3.2l6.8-6.8C35.8 2.2 30.3 0 24 0 14.7 0 6.7 5.4 2.7 13.3l7.9 6.1C12.5 13 17.8 9.5 24 9.5z"/>
              <path fill="#4285F4" d="M46.5 24.5c0-1.6-.1-3.1-.4-4.5H24v8.5h12.7c-.6 3-2.3 5.5-4.8 7.2l7.6 5.9c4.4-4.1 7-10.1 7-17.1z"/>
              <path fill="#FBBC05" d="M10.6 28.6A14.5 14.5 0 0 1 9.5 24c0-1.6.3-3.2.8-4.6l-7.9-6.1A24 24 0 0 0 0 24c0 3.9.9 7.5 2.7 10.7l7.9-6.1z"/>

// 🧑‍🏫 FACULTY SHELL
// ══════════════════════════════════════════════════════════════════════════════
function FacultyShell({session,onLogout}) {
  const {faculty}=session;
  const [allChoices,setAllChoices]=useState({});
  const [activeSem,setActiveSem]=useState(1);
  const [local,setLocal]=useState({});
  const [saved,setSaved]=useState(true);
  const [toast,setToast]=useState("");
  const [saving,setSaving]=useState(false);

  // Subscribe to realtime updates
  useEffect(()=>{
    const unsub=subscribeChoices(data=>{
      setAllChoices(data);
      // Only update local if not edited yet
      setLocal(prev=>Object.keys(prev).length===0&&data[faculty.short]
        ? JSON.parse(JSON.stringify(data[faculty.short])) : prev);
    });
    return unsub;
  },[]);

  const setPref=(sem,code,rank)=>{
    setSaved(false);
    setLocal(prev=>{
      const n=JSON.parse(JSON.stringify(prev));
      if(!n[sem])n[sem]={};
      for(const c of Object.keys(n[sem])) if(n[sem][c]?.rank===rank) delete n[sem][c];
      if(n[sem][code]?.rank===rank) delete n[sem][code];
      else n[sem][code]={rank,ts:new Date().toISOString()};
      return n;
    });
  };

  const handleSave=async()=>{
    setSaving(true);
    await writeFacultyChoices(faculty.short,local);
    setSaved(true);setSaving(false);
    setToast("✅ Choices saved!");setTimeout(()=>setToast(""),3000);
  };

  const totalFilled=Object.values(local).reduce((a,s)=>a+Object.values(s||{}).filter(v=>v?.rank).length,0);

  return (
    <div style={{display:"flex",flexDirection:"column",height:"100vh"}}>
      {/* Topbar */}
      <div style={{height:60,background:"#fff",borderBottom:"1px solid #e8eaed",
        display:"flex",alignItems:"center",padding:"0 24px",justifyContent:"space-between",flexShrink:0,
        boxShadow:"0 1px 3px rgba(0,0,0,.07)"}}>
        <div style={{display:"flex",alignItems:"center",gap:12}}>
          <div style={{width:30,height:30,borderRadius:8,background:"#1a73e8",display:"flex",
            alignItems:"center",justifyContent:"center",color:"#fff",fontWeight:800,fontSize:13}}>A</div>
          <div>
            <div style={{fontSize:14,fontWeight:700,color:"#202124"}}>Subject Preference System</div>
            <div style={{fontSize:11,color:"#5f6368"}}>CS & IT · AY 2025-26</div>
          </div>
        </div>
        <div style={{display:"flex",alignItems:"center",gap:14}}>
          <span style={{fontSize:12,color:"#5f6368"}}>{totalFilled} preferences saved</span>
          <Avatar name={faculty.name} size={32}/>
          <div style={{display:"none"}}>
            <div style={{fontSize:13,fontWeight:600}}>{faculty.name}</div>
            <div style={{fontSize:11,color:"#5f6368"}}>{faculty.email}</div>
          </div>
          <button onClick={onLogout} style={{padding:"6px 16px",background:"#f8f9fa",
            border:"1px solid #dadce0",borderRadius:20,fontSize:12,cursor:"pointer"}}>Sign out</button>
        </div>
      </div>

      <div style={{display:"flex",flex:1,overflow:"hidden"}}>
        {/* Sidebar */}
        <div style={{width:210,background:"#fff",borderRight:"1px solid #e8eaed",
          padding:"14px 0",overflowY:"auto",flexShrink:0}}>
          <div style={{padding:"2px 16px 8px",fontSize:11,fontWeight:700,color:"#80868b",
            textTransform:"uppercase",letterSpacing:1}}>My Semesters</div>
          {Object.keys(SEMESTERS).map(s=>{
            const sem=parseInt(s),fc=local[sem]||{};
            const count=Object.values(fc).filter(v=>v?.rank).length,active=activeSem===sem;
            return <div key={sem} onClick={()=>setActiveSem(sem)}
              style={{display:"flex",alignItems:"center",justifyContent:"space-between",
                padding:"9px 16px",cursor:"pointer",borderRadius:"0 22px 22px 0",marginRight:6,
                background:active?"#e8f0fe":"transparent",color:active?"#1a73e8":"#3c4043",
                fontWeight:active?600:400,fontSize:13,transition:"background .12s"}}>
              <span>Semester {sem}</span>
              {count>0&&<span style={{background:active?"#1a73e8":"#dadce0",
                color:active?"#fff":"#5f6368",borderRadius:10,padding:"1px 7px",fontSize:11}}>{count}</span>}
            </div>;
          })}
          <div style={{margin:"14px 8px 8px",borderTop:"1px solid #e8eaed"}}/>
          <div style={{padding:"8px 16px",fontSize:12,color:"#5f6368"}}>
            <div style={{fontWeight:600,color:"#202124",marginBottom:3}}>My Summary</div>
            <div>{totalFilled} total choices filled</div>
          </div>
        </div>

        {/* Content */}
        <div style={{flex:1,overflowY:"auto",padding:"22px 26px 80px"}}>
          <FacultySemView sem={activeSem} local={local} setPref={setPref}/>
        </div>
      </div>

      {/* Save bar */}
      <div style={{height:58,background:"#fff",borderTop:"1px solid #e8eaed",
        display:"flex",alignItems:"center",justifyContent:"space-between",
        padding:"0 26px",flexShrink:0}}>
        <span style={{fontSize:13,color:saved?"#137333":"#c5221f",fontWeight:saved?400:500}}>
          {saved?"✓ All changes saved to server.":"⚠️ Unsaved changes — click Save."}
        </span>
        <Btn label={saving?"Saving…":"Save Changes"} onClick={handleSave} disabled={saved||saving} color="#1a73e8"/>
      </div>
      <Toast msg={toast}/>
    </div>
  );
}

function FacultySemView({sem,local,setPref}) {
  const subjects=SEMESTERS[sem],semChoices=local[sem]||{};
  const rankMap={};
  for(const [code,v] of Object.entries(semChoices)) if(v?.rank) rankMap[v.rank]=code;

  return (
    <div>
      <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:6}}>
        <div style={{width:8,height:32,borderRadius:3,background:SEM_COLORS[sem-1],flexShrink:0}}/>
        <div>
          <h2 style={{fontSize:18,fontWeight:600,color:"#202124"}}>Semester {sem}</h2>
          <p style={{fontSize:12,color:"#5f6368",marginTop:2}}>Select 1st, 2nd, and 3rd preference. Each rank applies to one subject only per semester.</p>
        </div>
      </div>

      {/* Chips */}
      <div style={{display:"flex",gap:8,margin:"14px 0",flexWrap:"wrap"}}>
        {[1,2,3].map(rank=>{
          const code=rankMap[rank],subj=code?subjects.find(s=>s.code===code):null;
          return <div key={rank} style={{display:"flex",alignItems:"center",gap:7,padding:"7px 14px",
            borderRadius:22,border:`1.5px solid ${subj?PREF[rank].border:"#e8eaed"}`,
            background:subj?PREF[rank].bg:"#fff"}}>
            <span style={{fontSize:15}}>{PREF[rank].emoji}</span>
            <div>
              <div style={{fontSize:11,fontWeight:700,color:subj?PREF[rank].text:"#80868b"}}>{PREF[rank].label}</div>
              <div style={{fontSize:12,color:subj?PREF[rank].text:"#bdc1c6"}}>{subj?subj.name:"Not selected"}</div>
            </div>
          </div>;
        })}
      </div>

      {/* Subject cards */}
      <div style={{display:"grid",gap:9}}>
        {subjects.map((s,i)=>{
          const cr=semChoices[s.code]?.rank,sel=!!cr;
          return <div key={s.code} style={{background:"#fff",borderRadius:11,
            border:`1.5px solid ${sel?PREF[cr].border:"#e8eaed"}`,
            padding:"13px 16px",display:"flex",alignItems:"center",gap:14,
            boxShadow:sel?"0 2px 6px rgba(0,0,0,.07)":"none",transition:"all .15s"}}>
            <div style={{width:34,height:34,borderRadius:8,background:sel?PREF[cr].bg:"#f8f9fa",
              display:"flex",alignItems:"center",justifyContent:"center",fontSize:17,flexShrink:0}}>
              {sel?PREF[cr].emoji:"📖"}
            </div>
            <div style={{flex:1,minWidth:0}}>
              <div style={{fontSize:14,fontWeight:600,color:"#202124"}}>{s.name}</div>
              <div style={{fontSize:11,color:"#5f6368"}}>{s.code} · {s.credits} credits</div>
            </div>
            <div style={{display:"flex",gap:5,flexShrink:0}}>
              {[1,2,3].map(rank=>{
                const active=cr===rank;
                return <button key={rank} onClick={()=>setPref(sem,s.code,rank)}
                  style={{padding:"5px 12px",borderRadius:18,fontSize:12,fontWeight:600,cursor:"pointer",
                    border:`1.5px solid ${active?PREF[rank].border:"#dadce0"}`,
                    background:active?PREF[rank].bg:"#fff",color:active?PREF[rank].text:"#5f6368",
                    transition:"all .12s"}}>
                  {PREF[rank].emoji} {PREF[rank].label}
                </button>;
              })}
            </div>
          </div>;
        })}
      </div>
    </div>
  );
}

// 🔐 ADMIN SHELL
// ══════════════════════════════════════════════════════════════════════════════
function AdminShell({onLogout}) {
  const [choices,setChoices]=useState({});
  const [view,setView]=useState("overview");
  const [editTarget,setEditTarget]=useState(null);
  const [editLocal,setEditLocal]=useState({});
  const [editSem,setEditSem]=useState(1);
  const [toast,setToast]=useState("");

  useEffect(()=>{
    const unsub=subscribeChoices(setChoices);
    return unsub;
  },[]);

  const showToast=msg=>{setToast(msg);setTimeout(()=>setToast(""),3000);};

  const openEdit=f=>{
    setEditTarget(f);
    setEditLocal(choices[f.short]?JSON.parse(JSON.stringify(choices[f.short])):{});
    setEditSem(1);setView("edit");
  };

  const setPref=(sem,code,rank)=>{
    setEditLocal(prev=>{
      const n=JSON.parse(JSON.stringify(prev));
      if(!n[sem])n[sem]={};
      for(const c of Object.keys(n[sem])) if(n[sem][c]?.rank===rank) delete n[sem][c];
      if(n[sem][code]?.rank===rank) delete n[sem][code];
      else n[sem][code]={rank,ts:new Date().toISOString(),adminEdit:true};
      return n;
    });
  };

  const saveEdit=async()=>{
    await writeFacultyChoices(editTarget.short,editLocal);
    showToast(`✅ ${editTarget.name}'s choices saved.`);
    setView("overview");
  };

  const doClear=async f=>{
    if(!window.confirm(`Clear ALL choices for ${f.name}?`))return;
    await clearFacultyChoices(f.short);
    showToast(`🗑️ ${f.name}'s choices cleared.`);
  };

  const stats=(()=>{
    let submitted=0,conflicts=0,noTakers=0;
    for(const f of FACULTY_LIST){
      const fc=choices[f.short]||{};
      if(Object.values(fc).some(s=>Object.values(s||{}).some(v=>v?.rank)))submitted++;
    }
    for(const [semStr,subs] of Object.entries(SEMESTERS)){
      const sem=parseInt(semStr);
      for(const s of subs){
        const c1=FACULTY_LIST.filter(f=>choices[f.short]?.[sem]?.[s.code]?.rank===1).length;
        const tot=FACULTY_LIST.filter(f=>choices[f.short]?.[sem]?.[s.code]?.rank).length;
        if(c1>1)conflicts++;if(tot===0)noTakers++;
      }
    }
    return{submitted,conflicts,noTakers};
  })();

  const navItems=[
    {key:"overview",icon:"📊",label:"Overview"},
    {key:"matrix",  icon:"🗂️",label:"All Choices"},
    {key:"conflicts",icon:"⚡",label:"Conflicts"},
  ];

  return (
    <div style={{display:"flex",flexDirection:"column",height:"100vh"}}>
      {/* Topbar */}
      <div style={{height:60,background:"#1a73e8",display:"flex",alignItems:"center",
        padding:"0 24px",justifyContent:"space-between",flexShrink:0}}>
        <div style={{display:"flex",alignItems:"center",gap:12}}>
          <div style={{width:30,height:30,borderRadius:8,background:"rgba(255,255,255,.22)",
            display:"flex",alignItems:"center",justifyContent:"center",color:"#fff",fontWeight:800,fontSize:13}}>A</div>
          <div>
            <div style={{fontSize:14,fontWeight:700,color:"#fff"}}>Admin Dashboard – Timetable System</div>
            <div style={{fontSize:11,color:"rgba(255,255,255,.7)"}}>CS & IT · AY 2025-26 · Real-time data</div>
          </div>
        </div>
        <div style={{display:"flex",alignItems:"center",gap:12}}>
          <span style={{background:"rgba(255,255,255,.18)",color:"#fff",padding:"4px 12px",
            borderRadius:16,fontSize:12,fontWeight:600}}>🔐 Admin</span>
          <button onClick={onLogout} style={{padding:"6px 16px",background:"rgba(255,255,255,.15)",
            border:"1px solid rgba(255,255,255,.4)",borderRadius:18,fontSize:12,cursor:"pointer",color:"#fff"}}>
            Sign out
          </button>
        </div>
      </div>

      <div style={{display:"flex",flex:1,overflow:"hidden"}}>
        {/* Sidebar */}
        <div style={{width:210,background:"#fff",borderRight:"1px solid #e8eaed",
          padding:"14px 0",overflowY:"auto",flexShrink:0}}>
          <div style={{padding:"2px 16px 8px",fontSize:11,fontWeight:700,color:"#80868b",
            textTransform:"uppercase",letterSpacing:1}}>Views</div>
          {navItems.map(n=>{
            const active=view===n.key&&view!=="edit";
            return <div key={n.key} onClick={()=>setView(n.key)}
              style={{display:"flex",alignItems:"center",gap:9,padding:"9px 16px",cursor:"pointer",
                borderRadius:"0 22px 22px 0",marginRight:6,transition:"background .12s",
                background:active?"#e8f0fe":"transparent",
                color:active?"#1a73e8":"#3c4043",fontWeight:active?600:400,fontSize:13}}>
              <span>{n.icon}</span><span>{n.label}</span>
            </div>;
          })}
          <div style={{margin:"12px 8px",borderTop:"1px solid #e8eaed"}}/>
          <div style={{padding:"2px 16px 8px",fontSize:11,fontWeight:700,color:"#80868b",
            textTransform:"uppercase",letterSpacing:1}}>Edit Faculty</div>
          {FACULTY_LIST.map(f=>{
            const fc=choices[f.short]||{};
            const count=Object.values(fc).reduce((a,s)=>a+Object.values(s||{}).filter(v=>v?.rank).length,0);
            const active=view==="edit"&&editTarget?.short===f.short;
            return <div key={f.short} onClick={()=>openEdit(f)}
              style={{display:"flex",alignItems:"center",gap:9,padding:"8px 16px",cursor:"pointer",
                borderRadius:"0 22px 22px 0",marginRight:6,transition:"background .12s",
                background:active?"#e8f0fe":"transparent"}}>
              <Avatar name={f.name} size={24} bg={active?"#1a73e8":"#9aa0a6"}/>
              <span style={{fontSize:13,color:active?"#1a73e8":"#3c4043",fontWeight:active?600:400,
                flex:1,overflow:"hidden",whiteSpace:"nowrap",textOverflow:"ellipsis"}}>{f.short}</span>
              {count>0&&<span style={{fontSize:11,background:"#e8eaed",borderRadius:9,
                padding:"1px 6px",color:"#5f6368"}}>{count}</span>}
            </div>;
          })}
        </div>

        {/* Main */}
        <div style={{flex:1,overflowY:"auto",padding:24}}>
          {view==="overview"&&<AdminOverview choices={choices} stats={stats}
            onEdit={openEdit} onClear={doClear} onDownload={()=>exportExcel(choices)}/>}
          {view==="matrix"&&<AdminMatrix choices={choices}/>}
          {view==="conflicts"&&<AdminConflicts choices={choices}/>}
          {view==="edit"&&editTarget&&<AdminEdit faculty={editTarget} editLocal={editLocal}
            editSem={editSem} setEditSem={setEditSem} setPref={setPref}
            onSave={saveEdit} onCancel={()=>setView("overview")}/>}
        </div>
      </div>
      <Toast msg={toast}/>
    </div>
  );
}

    <div>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:18}}>

          <h2 style={{fontSize:20,fontWeight:600,color:"#202124"}}>Overview</h2>

          ⬇️ Download Excel (.xlsx)

      </div>

      {/* Stat cards */}
      <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:12,marginBottom:22}}>
        {[{l:"Total Faculty",v:FACULTY_LIST.length,bg:"#e8f0fe",fg:"#1a73e8"},

      {/* Table */}
      <div style={{background:"#fff",borderRadius:12,border:"1px solid #e8eaed",overflow:"hidden"}}>
        <div style={{padding:"13px 18px",borderBottom:"1px solid #e8eaed"}}>

        <table style={{width:"100%",borderCollapse:"collapse",fontSize:13}}>
          <thead>
            <tr style={{background:"#f8f9fa"}}>
              {["Faculty","🥇 1st","🥈 2nd","🥉 3rd","Total","Status","Actions"].map(h=>
                <th key={h} style={{padding:"9px 14px",textAlign:"left",fontWeight:600,

          </thead>
          <tbody>

              const fc=choices[f.short]||{};
              let c1=0,c2=0,c3=0;
              for(const s of Object.values(fc)) for(const v of Object.values(s||{})){

              }
              const tot=c1+c2+c3;
              const [sl,sb,sf]=tot===0?["Not submitted","#fce8e6","#c5221f"]:
                tot<6?["Partial","#fef7e0","#994c00"]:["Complete","#e6f4ea","#137333"];
              return <tr key={f.short} style={{borderBottom:"1px solid #f1f3f4",background:i%2?"#fafafa":"#fff"}}>

                  <div style={{display:"flex",alignItems:"center",gap:9}}>

                      <div style={{fontWeight:500,color:"#202124",fontSize:13}}>{f.name}</div>

                  </div>

                {[c1,c2,c3].map((c,ri)=><td key={ri} style={{padding:"11px 14px",textAlign:"center"}}>

                    :<span style={{color:"#dadce0"}}>—</span>}

                <td style={{padding:"11px 14px",textAlign:"center",fontWeight:700}}>{tot}</td>

          return <button key={s} onClick={()=>setSem(parseInt(s))}
            style={{padding:"6px 16px",borderRadius:18,border:"none",cursor:"pointer",
              fontWeight:a?600:400,fontSize:13,background:a?SEM_COLORS[s-1]:"#e8eaed",
              color:a?"#fff":"#5f6368"}}
          >Sem {s}</button>;})}
      </div>
      <div style={{background:"#fff",borderRadius:12,border:"1px solid #e8eaed",overflowX:"auto"}}>
        <table style={{width:"100%",borderCollapse:"collapse",fontSize:13}}>
          <thead>
            <tr style={{background:"#f8f9fa"}}>
              <th style={{padding:"9px 14px",textAlign:"left",fontWeight:600,color:"#5f6368",
                borderBottom:"1px solid #e8eaed",minWidth:160}}>Subject</th>
              {FACULTY_LIST.map(f=><th key={f.short} style={{padding:"9px 11px",textAlign:"center",
                fontWeight:600,color:"#5f6368",borderBottom:"1px solid #e8eaed",minWidth:72}}>{f.short}</th>)}
              <th style={{padding:"9px 11px",textAlign:"center",color:"#5f6368",borderBottom:"1px solid #e8eaed"}}>🥇</th>
              <th style={{padding:"9px 11px",textAlign:"center",color:"#5f6368",borderBottom:"1px solid #e8eaed"}}>🥈</th>
              <th style={{padding:"9px 11px",textAlign:"center",color:"#5f6368",borderBottom:"1px solid #e8eaed"}}>🥉</th>
            </tr>
          </thead>
          <tbody>
            {subjects.map((s,i)=>{
              const c1=FACULTY_LIST.filter(f=>choices[f.short]?.[sem]?.[s.code]?.rank===1).length;
              const c2=FACULTY_LIST.filter(f=>choices[f.short]?.[sem]?.[s.code]?.rank===2).length;
              const c3=FACULTY_LIST.filter(f=>choices[f.short]?.[sem]?.[s.code]?.rank===3).length;
              return <tr key={s.code} style={{borderBottom:"1px solid #f1f3f4",background:i%2?"#fafafa":"#fff"}}>
                <td style={{padding:"10px 14px",fontWeight:500,color:"#202124"}}>{s.name}</td>
                {FACULTY_LIST.map(f=>{
                  const rank=choices[f.short]?.[sem]?.[s.code]?.rank;
                  return <td key={f.short} style={{padding:"10px 11px",textAlign:"center"}}>
                    {rank?<span style={{background:PREF[rank].bg,color:PREF[rank].text,
                      padding:"2px 8px",borderRadius:11,fontWeight:600,fontSize:12}}>
                      {PREF[rank].emoji}</span>
                      :<span style={{color:"#e8eaed",fontSize:13}}>—</span>}
                  </td>;
                })}
                <td style={{padding:"10px 11px",textAlign:"center",fontWeight:700,
                  color:c1>1?"#c5221f":"#137333"}}>{c1}{c1>1?" ⚡":""}</td>
                <td style={{padding:"10px 11px",textAlign:"center",color:"#5f6368"}}>{c2}</td>
                <td style={{padding:"10px 11px",textAlign:"center",color:"#5f6368"}}>{c3}</td>
              </tr>;
            })}
          </tbody>
        </table>
      </div>
    </div>
  );
}

// ─── Admin: Conflicts ─────────────────────────────────────────────────────────
function AdminConflicts({choices}) {
  const conflicts=[],noTakers=[];
  for(const [semStr,subs] of Object.entries(SEMESTERS)){
    const sem=parseInt(semStr);
    for(const s of subs){
      const f1=FACULTY_LIST.filter(f=>choices[f.short]?.[sem]?.[s.code]?.rank===1);
      const f2=FACULTY_LIST.filter(f=>choices[f.short]?.[sem]?.[s.code]?.rank===2);
      const f3=FACULTY_LIST.filter(f=>choices[f.short]?.[sem]?.[s.code]?.rank===3);
      if(f1.length>1)conflicts.push({sem,s,f1,f2,f3});
      if(f1.length+f2.length+f3.length===0)noTakers.push({sem,s});
    }
  }
  const Card=({title,bg,fg,count,children})=>(
    <div style={{background:"#fff",borderRadius:12,border:"1px solid #e8eaed",overflow:"hidden",marginBottom:18}}>
      <div style={{padding:"13px 18px",borderBottom:"1px solid #e8eaed",background:bg}}>
        <span style={{fontWeight:600,color:fg,fontSize:14}}>{title} ({count})</span>
      </div>
      {children}
    </div>
  );
  return (
    <div>
      <h2 style={{fontSize:20,fontWeight:600,color:"#202124",marginBottom:18}}>Conflicts & Gaps</h2>
      <Card title="⚡ Multiple Faculty — Same 1st Preference" bg="#fce8e6" fg="#c5221f" count={conflicts.length}>
        {conflicts.length===0
          ?<div style={{padding:24,textAlign:"center",color:"#137333",fontWeight:500}}>✅ No conflicts found!</div>
          :<table style={{width:"100%",borderCollapse:"collapse",fontSize:13}}>
            <thead><tr style={{background:"#fafafa"}}>
              {["Sem","Subject","1st (Conflict)","2nd Pref","3rd Pref","Action"].map(h=>
                <th key={h} style={{padding:"9px 14px",textAlign:"left",fontWeight:600,
                  color:"#5f6368",borderBottom:"1px solid #e8eaed"}}>{h}</th>)}
            </tr></thead>
            <tbody>
              {conflicts.map((c,i)=><tr key={i} style={{borderBottom:"1px solid #f1f3f4",background:i%2?"#fafafa":"#fff"}}>
                <td style={{padding:"10px 14px",fontWeight:600}}>{c.sem}</td>
                <td style={{padding:"10px 14px",fontWeight:600,color:"#202124"}}>{c.s.name}</td>
                <td style={{padding:"10px 14px"}}>{c.f1.map(f=><span key={f.short}
                  style={{background:PREF[1].bg,color:PREF[1].text,padding:"2px 8px",
                    borderRadius:10,fontSize:12,fontWeight:600,marginRight:4}}>{f.short}</span>)}</td>
                <td style={{padding:"10px 14px"}}>{c.f2.map(f=><span key={f.short}
                  style={{background:PREF[2].bg,color:PREF[2].text,padding:"2px 8px",
                    borderRadius:10,fontSize:12,marginRight:4}}>{f.short}</span>)}</td>
                <td style={{padding:"10px 14px"}}>{c.f3.map(f=><span key={f.short}
                  style={{background:PREF[3].bg,color:PREF[3].text,padding:"2px 8px",
                    borderRadius:10,fontSize:12,marginRight:4}}>{f.short}</span>)}</td>
                <td style={{padding:"10px 14px",fontSize:12,color:"#5f6368"}}>Assign one; redirect others</td>
              </tr>)}
            </tbody>
          </table>}
      </Card>
      <Card title="⚠️ Subjects with No Faculty Interest" bg="#fef7e0" fg="#994c00" count={noTakers.length}>
        {noTakers.length===0
          ?<div style={{padding:24,textAlign:"center",color:"#137333",fontWeight:500}}>✅ All subjects have interested faculty!</div>
          :<table style={{width:"100%",borderCollapse:"collapse",fontSize:13}}>
            <thead><tr style={{background:"#fafafa"}}>
              {["Sem","Code","Subject","Credits","Action"].map(h=>
                <th key={h} style={{padding:"9px 14px",textAlign:"left",fontWeight:600,
                  color:"#5f6368",borderBottom:"1px solid #e8eaed"}}>{h}</th>)}
            </tr></thead>
            <tbody>
              {noTakers.map((n,i)=><tr key={i} style={{borderBottom:"1px solid #f1f3f4",background:i%2?"#fafafa":"#fff"}}>
                <td style={{padding:"10px 14px"}}>{n.sem}</td>
                <td style={{padding:"10px 14px",fontWeight:600,color:"#1a73e8"}}>{n.s.code}</td>
                <td style={{padding:"10px 14px",fontWeight:500}}>{n.s.name}</td>
                <td style={{padding:"10px 14px",textAlign:"center"}}>{n.s.credits}</td>
                <td style={{padding:"10px 14px",color:"#c5221f",fontWeight:600,fontSize:12}}>Assign manually</td>
              </tr>)}
            </tbody>
          </table>}
      </Card>
    </div>
  );
}

// ─── Admin: Edit Faculty ──────────────────────────────────────────────────────
function AdminEdit({faculty,editLocal,editSem,setEditSem,setPref,onSave,onCancel}) {
  const subjects=SEMESTERS[editSem],semChoices=editLocal[editSem]||{};
  const rankMap={};
  for(const [code,v] of Object.entries(semChoices)) if(v?.rank) rankMap[v.rank]=code;

  return (
    <div>
      <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:18}}>
        <button onClick={onCancel} style={{padding:"7px 16px",background:"#f8f9fa",
          border:"1px solid #dadce0",borderRadius:18,fontSize:13,cursor:"pointer"}}>← Back</button>
        <Avatar name={faculty.name} size={34}/>
        <div>
          <h2 style={{fontSize:17,fontWeight:600,color:"#202124"}}>{faculty.name}</h2>
          <span style={{fontSize:11,background:"#fce8e6",color:"#c5221f",padding:"2px 8px",
            borderRadius:10,fontWeight:700}}>🔐 Admin Editing</span>
        </div>
        <div style={{marginLeft:"auto",display:"flex",gap:9}}>
          <button onClick={onCancel} style={{padding:"8px 18px",background:"#f8f9fa",
            border:"1px solid #dadce0",borderRadius:6,fontSize:13,cursor:"pointer"}}>Cancel</button>
          <Btn label="Save Changes" onClick={onSave} color="#1a73e8"/>
        </div>
      </div>

      <div style={{display:"flex",gap:7,marginBottom:18,flexWrap:"wrap"}}>
        {Object.keys(SEMESTERS).map(s=>{
          const sem=parseInt(s),fc=editLocal[sem]||{};
          const count=Object.values(fc).filter(v=>v?.rank).length,active=editSem===sem;
          return <button key={sem} onClick={()=>setEditSem(sem)}
            style={{padding:"6px 16px",borderRadius:18,border:"none",cursor:"pointer",
              fontWeight:active?600:400,fontSize:13,
              background:active?SEM_COLORS[sem-1]:"#e8eaed",color:active?"#fff":"#5f6368"}}>
            Sem {sem}{count>0?` (${count})`:""}</button>;
        })}
      </div>

      <div style={{display:"flex",gap:8,marginBottom:14,flexWrap:"wrap"}}>
        {[1,2,3].map(rank=>{
          const code=rankMap[rank],subj=code?subjects.find(s=>s.code===code):null;
          return <div key={rank} style={{display:"flex",alignItems:"center",gap:7,padding:"7px 13px",
            borderRadius:20,border:`1.5px solid ${subj?PREF[rank].border:"#e8eaed"}`,
            background:subj?PREF[rank].bg:"#fff"}}>
            <span>{PREF[rank].emoji}</span>
            <span style={{fontSize:12,fontWeight:600,color:subj?PREF[rank].text:"#80868b"}}>
              {subj?subj.name:"Not selected"}</span>
          </div>;
        })}
      </div>

      <div style={{display:"grid",gap:9}}>
        {subjects.map((s,i)=>{
          const cr=semChoices[s.code]?.rank,sel=!!cr,ae=semChoices[s.code]?.adminEdit;
          return <div key={s.code} style={{background:"#fff",borderRadius:11,
            border:`1.5px solid ${sel?PREF[cr].border:"#e8eaed"}`,
            padding:"13px 16px",display:"flex",alignItems:"center",gap:14}}>
            <div style={{width:34,height:34,borderRadius:8,background:sel?PREF[cr].bg:"#f8f9fa",
              display:"flex",alignItems:"center",justifyContent:"center",fontSize:17,flexShrink:0}}>
              {sel?PREF[cr].emoji:"📖"}
            </div>
            <div style={{flex:1,minWidth:0}}>
              <div style={{display:"flex",alignItems:"center",gap:7}}>
                <span style={{fontSize:14,fontWeight:600,color:"#202124"}}>{s.name}</span>
                {ae&&<span style={{fontSize:10,background:"#fef7e0",color:"#994c00",
                  padding:"1px 7px",borderRadius:9,fontWeight:700}}>Admin edited</span>}
              </div>
              <div style={{fontSize:11,color:"#5f6368"}}>{s.code} · {s.credits} credits</div>
            </div>
            <div style={{display:"flex",gap:5,flexShrink:0}}>
              {[1,2,3].map(rank=>{
                const active=cr===rank;
                return <button key={rank} onClick={()=>setPref(editSem,s.code,rank)}
                  style={{padding:"5px 11px",borderRadius:18,fontSize:12,fontWeight:600,cursor:"pointer",
                    border:`1.5px solid ${active?PREF[rank].border:"#dadce0"}`,
                    background:active?PREF[rank].bg:"#fff",color:active?PREF[rank].text:"#5f6368",
                    transition:"all .12s"}}>
                  {PREF[rank].emoji} {PREF[rank].label}
                </button>;
              })}
            </div>
          </div>;
        })}
      </div>
    </div>
  );
}

// ══════════════════════════════════════════════════════════════════════════════
// 🚀 ROOT
// ══════════════════════════════════════════════════════════════════════════════
function App() {
  const [session,setSession]=useState(null);
  const [checking,setChecking]=useState(true);

  // Restore session if Firebase Auth already has a signed-in user (page refresh)
  useEffect(()=>{
    if(!auth){setChecking(false);return;}
    const unsub=auth.onAuthStateChanged(user=>{
      if(user){
        const email=(user.email||"").toLowerCase();
        if(email===ADMIN_EMAIL){setSession({role:"admin",user});}
        else{
          const fac=FACULTY_LIST.find(f=>f.email.toLowerCase()===email);
          if(fac) setSession({role:"faculty",faculty:fac,user});
          else setSession(null);
        }
      } else {
        setSession(null);
      }
      setChecking(false);
    });
    return unsub;
  },[]);

  const handleLogout=()=>{
    signOutGoogle();
    setSession(null);
  };

  if(checking) return <div style={{minHeight:"100vh",display:"flex",alignItems:"center",
    justifyContent:"center",color:"#5f6368",fontSize:14}}>Loading…</div>;
  if(!session) return <LoginScreen onLogin={setSession}/>;
  return session.role==="faculty"
    ?<FacultyShell session={session} onLogout={handleLogout}/>
    :<AdminShell onLogout={handleLogout}/>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
